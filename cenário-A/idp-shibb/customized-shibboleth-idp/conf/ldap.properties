# LDAP authentication configuration for local OpenLDAP container

## Authenticator strategy
idp.authn.LDAP.authenticator = bindSearchAuthenticator

## Connection properties
idp.authn.LDAP.ldapURL = ldap://ldap:389
idp.authn.LDAP.useStartTLS = false
idp.authn.LDAP.useSSL = false
idp.authn.LDAP.connectTimeout = PT3S
idp.authn.LDAP.responseTimeout = PT3S

## SSL/TLS disabled for local lab
idp.authn.LDAP.sslConfig = jvmTrust
idp.authn.LDAP.trustCertificates =
idp.authn.LDAP.trustStore =

## Return attributes during authentication
idp.authn.LDAP.returnAttributes = mail,givenName,sn,cn

## DN resolution properties
idp.authn.LDAP.baseDN = ou=people,dc=gidlab,dc=rnp,dc=br
idp.authn.LDAP.subtreeSearch = false
idp.authn.LDAP.userFilter = (uid={user})

## Bind search configuration
idp.authn.LDAP.bindDN = cn=admin,dc=gidlab,dc=rnp,dc=br
idp.authn.LDAP.bindDNCredential = admin

## Direct DN format
idp.authn.LDAP.dnFormat = uid=%s,ou=people,dc=gidlab,dc=rnp,dc=br

## LDAP attribute resolver configuration
idp.attribute.resolver.LDAP.ldapURL = ldap://ldap:389
idp.attribute.resolver.LDAP.connectTimeout = PT3S
idp.attribute.resolver.LDAP.responseTimeout = PT3S
idp.attribute.resolver.LDAP.baseDN = ou=people,dc=gidlab,dc=rnp,dc=br
idp.attribute.resolver.LDAP.bindDN = cn=admin,dc=gidlab,dc=rnp,dc=br
idp.attribute.resolver.LDAP.bindDNCredential = admin
idp.attribute.resolver.LDAP.useStartTLS = false
idp.attribute.resolver.LDAP.trustCertificates =
idp.attribute.resolver.LDAP.searchFilter = (uid=$resolutionContext.principal)

## LDAP pool configuration
idp.pool.LDAP.minSize = 0
idp.pool.LDAP.maxSize = 10
idp.pool.LDAP.validateOnCheckout = false
idp.pool.LDAP.validatePeriodically = true
idp.pool.LDAP.validatePeriod = PT5M
idp.pool.LDAP.prunePeriod = PT5M
idp.pool.LDAP.idleTime = PT10M
idp.pool.LDAP.blockWaitTime = PT3S
idp.pool.LDAP.failFastInitialize = false
